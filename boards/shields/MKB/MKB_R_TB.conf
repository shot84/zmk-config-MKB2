# Basic hardware configurations
CONFIG_SPI=y

# PMW3610 optical sensor settings
CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_SWAP_XY=n
CONFIG_PMW3610_ALT_INVERT_X=n
CONFIG_PMW3610_ALT_INVERT_Y=y
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=14

# Input processor configuration
CONFIG_ZMK_INPUT_PROCESSOR_KEYBIND=y

# ------------------------------
# Prospector Scanner 用設定
# ------------------------------

# Prospector に流すステータス広告を有効化
CONFIG_ZMK_STATUS_ADVERTISEMENT=y

# Prospector 上に表示するキーボード名
# 好きな名前に変えてOK（例: "MeKaBu_R" など）
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="MeKaBu"

# BLE（周辺機器モード）を有効化
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# （分割の場合のみ）中央側でバッテリー情報を取得する場合
# 分割じゃないならこの２行は不要でもよい
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# 広告の頻度設定（moNa2 と同じ値）
CONFIG_ZMK_STATUS_ADV_ACTIVITY_BASED=y
CONFIG_ZMK_STATUS_ADV_ACTIVE_INTERVAL_MS=200
CONFIG_ZMK_STATUS_ADV_IDLE_INTERVAL_MS=10000
CONFIG_ZMK_STATUS_ADV_ACTIVITY_TIMEOUT_MS=120000